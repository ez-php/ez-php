services:

  app:
    build:
      context: .
      dockerfile: docker/app/Dockerfile
      args:
        WWWUSER: 1000
        WWWGROUP: 1000
    container_name: ez-php-template-app
    ports:
      - "${APP_PORT:-8000}:80"
    volumes:
      - .:/var/www/html
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  redis:
    image: redis:7-alpine
    container_name: ez-php-template-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"

  mailpit:
    image: axllent/mailpit:latest
    container_name: ez-php-template-mailpit
    ports:
      - "${MAIL_WEB_PORT:-8025}:8025"
      - "${MAIL_PORT:-1025}:1025"

  # meilisearch:
  #   image: getmeili/meilisearch:v1.13
  #   container_name: ez-php-template-meilisearch
  #   ports:
  #     - "${MEILISEARCH_PORT:-7700}:7700"
  #   environment:
  #     MEILI_MASTER_KEY: "${MEILISEARCH_KEY:-}"
  #     MEILI_NO_ANALYTICS: "true"
  #   tmpfs:
  #     - /meili_data

  db:
    image: mysql:8.4
    container_name: ez-php-template-db
    restart: unless-stopped
    ports:
      - "${DB_HOST_PORT:-3306}:3306"
    environment:
      MYSQL_ROOT_PASSWORD: "${DB_PASSWORD}"
      MYSQL_DATABASE: "${DB_DATABASE}"
      MYSQL_USER: "${DB_USERNAME}"
      MYSQL_PASSWORD: "${DB_PASSWORD}"
    volumes:
      - dbdata:/var/lib/mysql
      - ./docker/db/create-db.sh:/docker-entrypoint-initdb.d/create-db.sh
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

volumes:
  dbdata:
